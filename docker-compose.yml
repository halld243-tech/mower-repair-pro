services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
    volumes:
      - db-data:/app/data
    networks:
      - app-network

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
